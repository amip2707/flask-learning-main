<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
    background: linear-gradient(135deg, #f5f7fa 0%, #b5e2fa 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.box {
    background: #ffffff;
    border-radius: 24px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    box-sizing: border-box;
    box-shadow: 0 30px 70px rgba(3, 4, 94, 0.07), 
                0 10px 24px rgba(3, 4, 94, 0.03),
                0 1px 3px rgba(0, 0, 0, 0.02);
    border: 1px solid rgba(181, 226, 250, 0.35);
}

h1 {
    font-size: 30px;
    font-weight: 800;
    color: #03045e;
    margin: 0 0 6px;
    letter-spacing: -0.8px;
}

.sub {
    font-size: 14px;
    color: #64748b;
    margin: 0 0 24px;
    font-weight: 400;
}

.field {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
}

.field label {
    font-size: 13px;
    font-weight: 600;
    color: #03045e;
    margin-bottom: 6px;
    text-align: left;
}

.field input {
    width: 100%;
    box-sizing: border-box;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #03045e;
    outline: none;
    font-weight: 500;
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.field input::placeholder {
    color: #cbd5e1;
    font-weight: 400;
}

.field input:hover:not(:disabled) {
    border-color: #cbd5e1;
    background: #f1f5f9;
}

.field input:focus {
    border-color: #0077b6;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.14);
}

/* Beautiful Disabled State for Password Fields Before OTP Verification */
.field input:disabled {
    background: #f1f5f9;
    border-color: #e2e8f0;
    color: #94a3b8;
    cursor: not-allowed;
    opacity: 0.7;
}

/* Primary Action Buttons (Send OTP & Reset Password) */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #0077b6 0%, #03045e 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 14px rgba(3, 4, 94, 0.18);
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

button:hover:not(:disabled) {
    box-shadow: 0 8px 22px rgba(3, 4, 94, 0.28);
    transform: translateY(-1.5px);
}

button:active:not(:disabled) {
    transform: translateY(0.5px) scale(0.985);
}

/* Outlined Style for Secondary Buttons (Verify OTP) */
.secondary-btn {
    background: #ffffff;
    color: #0077b6;
    border: 1.5px solid #0077b6;
    box-shadow: none;
    margin-top: 12px;
}

.secondary-btn:hover:not(:disabled) {
    background: rgba(0, 119, 182, 0.04);
    border-color: #03045e;
    color: #03045e;
}

/* Universal Button Disabled State */
button:disabled {
    background: #e2e8f0;
    color: #94a3b8;
    border: none;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
}

#result {
    margin-top: 20px;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
}

/* Title Tag Badge to Match Register/Login Flows */
.box::before {
    content: "Security Portal";
    display: block; 
    width: max-content;
    color: #0077b6;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    background: rgba(0, 119, 182, 0.06);
    padding: 5px 10px;
    border-radius: 6px;
}

.footer {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-top: 24px;
    margin-bottom: 0;
    font-weight: 500;
}

.footer a {
    color: #0077b6;
    text-decoration: none;
    font-weight: 600;
    margin-left: 4px;
    transition: color 0.2s ease;
}

.footer a:hover {
    color: #03045e;
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="box">

    <h1>Reset Password</h1>
    <p class="sub">Recover your account using OTP verification</p>

    <div class="field">
        <label>Email Address</label>
        <input
            type="email"
            id="emailid"
            placeholder="Enter registered email">
    </div>

    <button onclick="sendOTP()">Send OTP</button>

    <div class="field" style="margin-top:20px;">
        <label>OTP</label>
        <input
            type="text"
            id="otpid"
            placeholder="Enter OTP">
    </div>

    <button
        class="secondary-btn"
        onclick="verifyOTP()">
        Verify OTP
    </button>

    <div class="field" style="margin-top:20px;">
        <label>New Password</label>
        <input
            type="password"
            id="newpasswordid"
            placeholder="Enter new password"
            disabled>
    </div>

    <div class="field">
        <label>Confirm Password</label>
        <input
            type="password"
            id="confirmpasswordid"
            placeholder="Confirm password"
            disabled>
    </div>

    <button
        onclick="resetPassword()"
        id="resetBtn"
        disabled>
        Reset Password
    </button>

    <p id="result"></p>

    <p class="footer">
        Remember password?
        <a href="/login">Back to Login</a>
    </p>

</div>

<script>

let otpVerified = false;

async function sendOTP(){

    let email =
        document.getElementById("emailid").value;

    let response = await fetch("/send-otp",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email:email
        })

    });

    let data = await response.json();

    let resultElement = document.getElementById("result");
    resultElement.innerText = data.message;
    resultElement.style.color = "#03045e";
}

async function verifyOTP(){

    let email =
        document.getElementById("emailid").value;

    let otp =
        document.getElementById("otpid").value;

    let response = await fetch("/verify-otp",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email:email,
            otp:otp
        })

    });

    let data = await response.json();
    let resultElement = document.getElementById("result");

    if(data.status === "success"){

        otpVerified = true;

        document.getElementById("newpasswordid")
            .disabled = false;

        document.getElementById("confirmpasswordid")
            .disabled = false;

        document.getElementById("resetBtn")
            .disabled = false;

        resultElement.innerText = "OTP Verified Successfully";
        resultElement.style.color = "green";
    }
    else{
        resultElement.innerText = data.message;
        resultElement.style.color = "red";
    }
}

async function resetPassword(){

    if(!otpVerified){
        return;
    }

    let email =
        document.getElementById("emailid").value;

    let newPassword =
        document.getElementById("newpasswordid").value.trim();

    let confirmPassword =
        document.getElementById("confirmpasswordid").value.trim();

    let resultElement = document.getElementById("result");

    // 🚨 FIX: Agar password fields khali hain toh request block karein
    if(newPassword === "" || confirmPassword === ""){
        resultElement.innerText = "Please enter a valid new password.";
        resultElement.style.color = "red";
        return; // Execution stop yahan se aage fetch nahi chalega
    }

    if(newPassword !== confirmPassword){
        resultElement.innerText = "Passwords do not match";
        resultElement.style.color = "red";
        return;
    }

    let response = await fetch("/reset-password",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email:email,
            password:newPassword
        })

    });

    let data = await response.json();

    if(data.status === "success"){

        alert("Password Updated Successfully");

        window.location.href = "/login";
    }
    else{
        resultElement.innerText = data.message;
        resultElement.style.color = "red";
    }
}

</script>

</body>
</html>
