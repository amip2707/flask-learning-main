<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:380px;
    background:white;
    padding:25px;
    border-radius:10px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:8px;
}

button:disabled{
    background:gray;
    cursor:not-allowed;
}

.link{
    text-align:center;
    color:#2563eb;
    cursor:pointer;
    font-size:13px;
    margin-top:10px;
}

#msg{
    text-align:center;
    font-size:13px;
    margin-top:10px;
    color:#dc2626;
}
</style>

</head>

<body>

<div class="card">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function showMsg(m){
    document.getElementById("msg").innerText = m;
}

function login(){

    let btn = document.getElementById("loginBtn");

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username === "" || password === ""){
        showMsg("Fill all fields");
        alert("Fill all fields");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Logging in...";

    fetch("/admin/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){

            localStorage.setItem("admin", username);

            showMsg("Login successful");
            alert("Login successful");

            window.location.href = "admin_dashboard.html";

        } else {

            showMsg(data.message || "Invalid credentials");
            alert("Login failed");
        }

        btn.disabled = false;
        btn.innerText = "Login";

    })
    .catch(err => {

        showMsg("Server error");
        alert("Server error");

        btn.disabled = false;
        btn.innerText = "Login";
    });

}

</script>

</body>
</html>
